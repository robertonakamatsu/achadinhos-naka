<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppWorker - Estúdio de Ofertas</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root { --primary: #1a73e8; --accent: #34a853; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; box-sizing: border-box; }
        h1 { color: var(--primary); font-size: 22px; margin-bottom: 20px; text-align: center; }
        
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; color: #444; text-align: left; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 15px; box-sizing: border-box; font-size: 15px; }
        
        .upload-area { border: 2px dashed #bbb; padding: 20px; border-radius: 10px; cursor: pointer; margin-bottom: 15px; background: #fafafa; }
        .upload-area:hover { border-color: var(--primary); }

        /* Estética do Story */
        #captureArea { background: white; width: 100%; padding: 20px; border-radius: 15px; border: 1px solid #eee; margin-top: 20px; display: none; text-align: center; }
        #prodImgPreview { width: 100%; max-height: 300px; object-fit: contain; border-radius: 8px; margin-bottom: 15px; }
        .title-display { font-size: 18px; font-weight: 700; color: #222; margin: 10px 0; line-height: 1.3; }
        .price-display { font-size: 32px; font-weight: 900; color: var(--accent); margin: 10px 0; }
        .footer-tag { font-size: 12px; color: #bbb; margin-top: 15px; }

        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-download { background: var(--accent); margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 AppWorker Estúdio</h1>
    
    <label>1. Foto do Produto (Print ou Foto)</label>
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <span id="uploadText">Clique para subir a imagem</span>
        <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleImage(this)">
    </div>

    <label>2. Título Curto</label>
    <input type="text" id="inTitle" placeholder="Ex: Smart TV 50 Polegadas" oninput="updatePreview()">

    <label>3. Preço (R$)</label>
    <input type="text" id="inPrice" placeholder="Ex: 1.999,00" oninput="updatePreview()">

    <div id="captureArea">
        <img id="prodImgPreview" src="" alt="">
        <div id="outTitle" class="title-display">Título do Produto</div>
        <div id="outPrice" class="price-display">R$ 0,00</div>
        <div class="footer-tag">appworker.com.br</div>
    </div>

    <button id="btnDownload" class="btn-download" style="display:none" onclick="baixar()">Baixar Story Pronto</button>
</div>

<script>
    function handleImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('prodImgPreview').src = e.target.result;
                document.getElementById('uploadText').innerText = "Imagem carregada!";
                document.getElementById('captureArea').style.display = 'block';
                document.getElementById('btnDownload').style.display = 'block';
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    function updatePreview() {
        const title = document.getElementById('inTitle').value;
        const price = document.getElementById('inPrice').value;
        
        document.getElementById('outTitle').innerText = title || "Título do Produto";
        document.getElementById('outPrice').innerText = price ? `R$ ${price}` : "R$ 0,00";
    }

    function baixar() {
        const area = document.getElementById('captureArea');
        html2canvas(area, { 
            backgroundColor: "#ffffff",
            scale: 2 
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = `oferta-${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>
</body>
</html>
