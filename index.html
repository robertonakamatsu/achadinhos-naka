<div class="container">
    <h1>🚀 AppWorker Ofertas</h1>
    
    <label>Cole seu Link de Afiliado (já gerado):</label>
    <input type="text" id="linkAfiliado" placeholder="https://shope.ee/... ou https://mercadolivre.com/...">

    <button onclick="puxarDados()">Puxar Dados da Oferta</button>

    <div id="previewArea" style="display:none; margin-top:20px; text-align:center;">
        <h3 id="prodTitle" style="font-size:16px;"></h3>
        <img id="prodImg" src="" style="width:200px; border-radius:10px; margin:10px 0;">
        <p id="prodPrice" style="font-weight:bold; color:green; font-size:20px;"></p>
        
        <button onclick="baixarImagem()" style="background:#ff5722;">Baixar Imagem para Story</button>
    </div>
</div>

<script>
    async function puxarDados() {
        const url = document.getElementById('linkAfiliado').value;
        if(!url) return alert("Cole o link primeiro!");

        // Usaremos um serviço gratuito de extração de meta-tags (OpenGraph)
        // Isso evita que o seu servidor seja bloqueado pela Shopee
        const api = `https://api.microlink.io?url=${encodeURIComponent(url)}`;

        try {
            const response = await fetch(api);
            const data = await response.json();
            
            if(data.status === 'success') {
                const info = data.data;
                document.getElementById('prodTitle').innerText = info.title || "Produto sem título";
                document.getElementById('prodImg').src = info.image?.url || "";
                document.getElementById('prodPrice').innerText = "Confira o preço no link!"; 
                document.getElementById('previewArea').style.display = 'block';
            }
        } catch (e) {
            alert("Erro ao buscar dados. Tente novamente ou insira manualmente.");
        }
    }
</script>
