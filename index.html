<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppWorker - Gerador de Stories</title>
    <style>
        :root { --primary: #1a73e8; --shopee: #ee4d2d; --amazon: #ff9900; --meli: #fff159; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; box-sizing: border-box; }
        h1 { color: var(--primary); font-size: 24px; text-align: center; margin-top: 0; }
        p { color: #666; font-size: 14px; text-align: center; }
        
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 16px; transition: border 0.3s; }
        input:focus { border-color: var(--primary); outline: none; }
        
        button { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-bottom: 10px; }
        button:active { transform: scale(0.98); }

        #previewArea { display: none; margin-top: 30px; border: 2px dashed #ddd; padding: 15px; border-radius: 15px; background: #fafafa; }
        #prodImg { width: 100%; max-width: 250px; border-radius: 10px; margin: 15px 0; background: #eee; }
        #prodTitle { font-size: 16px; font-weight: 600; color: #222; margin: 0; }
        
        .btn-download { background: #34a853; margin-top: 15px; }
        .loader { display: none; margin: 10px auto; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 AppWorker</h1>
    <p>Cole seu link de afiliado da <strong>Amazon, Shopee ou Mercado Livre</strong> para gerar o Story.</p>
    
    <label for="linkAfiliado">Link de Afiliado:</label>
    <input type="text" id="linkAfiliado" placeholder="https://shope.ee/... ou https://amzn.to/..." onpaste="setTimeout(puxarDados, 100)">

    <div id="loader" class="loader"></div>
    <button id="btnPuxar" onclick="puxarDados()">Capturar Dados do Produto</button>

    <div id="previewArea">
        <p style="font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #999;">Prévia da Imagem</p>
        <h3 id="prodTitle">Carregando título...</h3>
        <img id="prodImg" src="" alt="Produto">
        <p id="prodPrice" style="color: #2e7d32; font-size: 22px; font-weight: 800; margin: 10px 0;"></p>
        
        <button class="btn-download" onclick="alert('Funcionalidade de gerar imagem JPG em desenvolvimento!')">Baixar Arte para Story</button>
    </div>
</div>

<script>
    async function puxarDados() {
        const url = document.getElementById('linkAfiliado').value;
        if(!url) return;

        const btn = document.getElementById('btnPuxar');
        const loader = document.getElementById('loader');
        const preview = document.getElementById('previewArea');

        btn.style.display = 'none';
        loader.style.display = 'block';
        preview.style.display = 'none';

        try {
            // Usando Microlink para extrair meta-tags (OpenGraph)
            // Isso funciona para links curtos da Shopee, Amazon e Meli
            const response = await fetch(`https://api.microlink.io?url=${encodeURIComponent(url)}&palette=true`);
            const result = await response.json();

            if (result.status === 'success') {
                const data = result.data;
                
                document.getElementById('prodTitle').innerText = data.title || "Oferta Especial";
                document.getElementById('prodImg').src = data.image?.url || data.logo?.url || "";
                
                // Tenta extrair preço se disponível, senão deixa vazio para você preencher no Story
                document.getElementById('prodPrice').innerText = data.description?.match(/R\$\s?(\d+,\d{2})/)?.[0] || "🔥 Confira o Preço!";
                
                preview.style.display = 'block';
            } else {
                alert("Não conseguimos ler este link automaticamente. Tente copiar o link completo do produto.");
            }
        } catch (error) {
            console.error(error);
            alert("Erro na conexão. Verifique o link e tente novamente.");
        } finally {
            loader.style.display = 'none';
            btn.style.display = 'block';
        }
    }
</script>

</body>
</html>
